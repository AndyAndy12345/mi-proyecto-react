<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Tienda de Andrea Márquez{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'inicio' %}">🛍️ MiTienda Andrea</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white px-3" href="{% url 'inicio' %}">Inicio</a>
                <a class="nav-link text-white px-3" href="{% url 'lista_productos' %}">Productos</a>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block contenido %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto shadow-lg">
        <div class="container">
            <p class="mb-0">&copy; 2026 - Desarrollado por <b>Andrea Márquez</b> | Profesor: Aldo Álvarez Jurado</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
